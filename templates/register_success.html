{% extends "base.html" %}

{% block content %}

  <h1 class="text-2xl font-bold text-emerald-400">Registration Complete</h1>
  <p class="text-slate-400 mt-2">Slot <strong class="text-orange-400">#{{ slot.slot_number }}</strong> — {{ slot.squad_name }}</p>
