<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claiming Squad...</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='ff-lobby.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='ff-theme.css') }}" />
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0; }
    .claim-box { text-align:center;padding:24px; }
    .spinner { width:40px;height:40px;border:3px solid rgba(45,212,191,0.2);border-top-color:var(--ff-teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="claim-box">
    <div class="spinner"></div>
    <p style="color:var(--ff-text);font-size:16px;font-weight:700;margin:0 0 4px;">✅ Claiming Your Squad...</p>
    <p style="color:var(--ff-muted);font-size:13px;margin:0 0 8px;">{{ order.squad_name or "Squad" }} · Slot #{{ order.slot_number if order.slot_number else "—" }}</p>
    <p style="color:var(--ff-muted);font-size:12px;margin:0;">Redirecting to Lobby in <span id="countdown">2</span>s</p>
  </div>

  <script>
    (function () {
      var contact = "claimed_{{ order.id }}";
      try { localStorage.setItem("ff_contact", contact); localStorage.setItem("ff_join_epoch", "{{ order.tournament_id }}"); } catch (e) {}
      var sec = 2;
      var el = document.getElementById("countdown");
      var iv = setInterval(function () {
        sec -= 1;
        if (el) el.textContent = sec;
        if (sec <= 0) {
          clearInterval(iv);
          window.location.href = "{{ lobby_url }}";
        }
      }, 1000);
    })();
  </script>
</body>
</html>
