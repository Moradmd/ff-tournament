{% extends "base.html" %}
{% block title %}Export{% endblock %}
{% block content %}
<h1 class="text-xl font-bold mb-4">WhatsApp / Room Setup Export</h1>
<pre id="export" class="bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm whitespace-pre-wrap text-slate-300">{{ text }}</pre>
<button onclick="navigator.clipboard.writeText(document.getElementById('export').textContent);this.textContent='Copied!'"
  class="mt-4 bg-orange-500 text-black font-semibold px-4 py-2 rounded-lg">Copy all</button>
{% endblock %}
