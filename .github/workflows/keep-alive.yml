name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "https://ff-tournament-406b.onrender.com/health"
